<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự Án Responsive & Cá Nhân Hóa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Khám Phá Thiên Nhiên Kỳ Vĩ</h1>
        <p>Trang web tự động thay đổi giao diện theo kích thước màn hình, chế độ Sáng/Tối (Dark Mode) và cài đặt giảm chuyển động của bạn.</p>
    </header>

    <!-- Khu vực lưới hiển thị các hình ảnh -->
    <main class="gallery-container">

        <figure>
            <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600" alt="Dãy núi tuyết vĩ đại trùng điệp dưới nền trời xanh ngắt lúc ban ngày">
            <figcaption>
                <h3>Núi Tuyết Alpine</h3>
                <p>Đỉnh núi cao quanh năm bao phủ bởi tuyết trắng xóa, là điểm đến lý tưởng cho những ai đam mê thử thách và khám phá mạo hiểm.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600" alt="Những tia nắng vàng rực rỡ xuyên qua tán lá xanh dày đặc trong khu rừng nguyên sinh">
            <figcaption>
                <h3>Rừng Nguyên Sinh</h3>
                <p>Hệ sinh thái rừng rậm nhiệt đới hoang sơ, nơi những cây cổ thụ hàng trăm năm tuổi dang rộng tán lá đón ánh nắng ban mai rực rỡ.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600" alt="Bãi biển cát trắng mịn màng với làn nước biển trong xanh và rặng dừa thơ mộng">
            <figcaption>
                <h3>Bờ Biển Nhiệt Đới</h3>
                <p>Làn nước trong vắt màu ngọc bích hòa quyện cùng bờ cát trắng trải dài, mang lại cảm giác thư thái tuyệt đối cho kỳ nghỉ dưỡng.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=600" alt="Cảnh bình minh rực rỡ trên mặt biển với bầu trời chuyển sắc cam đỏ ấn tượng">
            <figcaption>
                <h3>Bình Minh Trên Biển</h3>
                <p>Khoảnh khắc mặt trời từ từ nhô lên khỏi đường chân trời, nhuộm hồng cả không gian và đánh thức vạn vật sau giấc ngủ dài.</p>
            </figcaption>
        </figure>

    </main>

</body>
</html>
